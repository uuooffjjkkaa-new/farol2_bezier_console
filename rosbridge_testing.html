<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Rosbridge Topics Test</title>
  <script src="https://cdn.jsdelivr.net/npm/roslib/build/roslib.min.js"></script>
</head>
<body>
  <h1>Available ROS Topics</h1>
  <ul id="topic-list"></ul>

  <script>
    var ros = new ROSLIB.Ros({
      url : 'ws://10.16.145.169:9090'  // replace with your rosbridge server
    });

    ros.on('connection', function() {
      console.log('Connected to rosbridge!');

      // Get topics
      ros.getTopics(function(topics) {
        console.log('Topics:', topics.topics);  // Print in console
        var list = document.getElementById('topic-list');
        topics.topics.forEach(function(topic) {
          var li = document.createElement('li');
          li.textContent = topic;
          list.appendChild(li);
        });
      });
    });

    ros.on('error', function(error) {
      console.error('Connection error:', error);
    });

    ros.on('close', function() {
      console.log('Connection closed');
    });
  </script>
</body>
</html>
